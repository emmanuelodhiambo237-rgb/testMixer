<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnstone Odhiambo | Mixologist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <div id="gridOverlay" class="grid-overlay">
        <div class="grid-header">
            <h2>Gallery</h2>
            <button id="closeGridBtn" class="close-grid">&times;</button>
        </div>
        <div class="image-grid overlay-grid" id="mobile-gallery-container"></div>
    </div>

    <header class="mobile-header">
        <div class="mobile-profile-group">
            <img src="images/profilepicture.jpg" alt="Profile" class="mobile-profile-pic">
            <div class="mobile-header-text">
                <h1>Johnstone Odhiambo</h1>
                <p class="mobile-subtitle">Mixologist Portfolio</p>
            </div>
        </div>
        <button class="view-images-btn" id="mobileViewBtn">View Images</button>
    </header>

    <div class="layout-wrapper">
        <aside class="left-panel">
            <div class="profile-section">
                <img src="images/profilepicture.jpg" alt="Profile" class="profile-pic">
                <h2>Johnstone Odhiambo</h2>
                <p class="subtitle">Mixologist Portfolio</p>
            </div>
            <div class="image-grid sidebar-grid" id="desktop-gallery-container"></div>
        </aside>

        <div class="center-wrapper">
            <main class="center-panel" id="video-container"></main>
            
            <div class="nav-arrows">
                <button id="btn-up" class="arrow-btn"><svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg></button>
                <button id="btn-down" class="arrow-btn"><svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></button>
            </div>
        </div>

        <aside class="right-panel">
            <div class="description-box">
                <h2 id="dynamic-title">Loading...</h2>
                <div class="divider"></div>
                <p id="dynamic-text">Please wait.</p>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
